# Fastnet — Cowes/Solent start, Land's End, Celtic Sea, Fastnet Rock,
# back past the Scillies to the Cherbourg finish (formerly fastnet-2027;
# next edition 2027).

name: fastnet
description: Fastnet course — Solent to Fastnet Rock to Cherbourg
enabled: true

bbox:
  lat_min: 48.8
  lat_max: 52.2
  lon_min: -10.8
  lon_max: -1.0

models:
  - ifs
  - aifs
  - gfs
  - icon_eu
  # High-res AROME/ARPEGE temporarily OFF (2-vCPU box decode budget) —
  # see HANDOFF "high-res load". Re-enable after fetch-side crop or upgrade.
  # - mf_arome
  # - mf_arpege

max_lead_hours: 144
keep_runs: 8
data_dir: data
poll_minutes: 10

observations:
  metar: true
  windycator: true
  # GTS marine stations via NDBC: Seven Stones LV at Land's End, W Channel
  # buoys + Channel LV for start/finish. Irish M3 (62092) / M5 (62094) are
  # in NDBC's station table but have no realtime2 feed — dropped 2026-07;
  # re-audit with scripts/find_ndbc_stations.py before racing in case the
  # Celtic Sea buoys come back on GTS.
  ndbc_stations: ["62107", "62030", "62050", "62103"]
  openmeteo: false
  focus: {lat: 50.0, lon: -6.0}    # mid-course, Celtic Sea approaches
  nmea:
    enabled: false
    transport: udp
    port: 10110

trust:
  yacht: 1.0
  metar: 0.85
  ndbc: 0.9
  windycator: 0.8
  openmeteo: 0.4

scoring:
  window_h: 48
  half_weight_nm: 60
  lead_half_h: 36
  recency_half_h: 12
  err_scale_ms: 2.5
  publish_window_h: 24
