# English Channel — Solent-centred, covering the RORC Channel racing area
# from the Western Approaches boundary to the Dover Strait (formerly
# solent). Box sized to include the GTS lightvessels/buoys: Channel LV,
# Greenwich LV, Sandettie LV, F3, and the Plymouth-area moorings.

name: english-channel
description: English Channel — Solent, south coast and Channel crossings
enabled: true

bbox:
  lat_min: 49.2
  lat_max: 51.3
  lon_min: -5.2
  lon_max: 2.1

models:
  - ifs
  - aifs
  - gfs
  - icon_eu
  - mf_arome        # 2.5 km — Channel; slimmed+cropped at fetch (cheap decode)
  - mf_arpege       # 0.1° Europe; slimmed+cropped at fetch

max_lead_hours: 72
keep_runs: 8
data_dir: data
poll_minutes: 10

observations:
  metar: true
  windycator: true         # Bramble Post, Calshot, Hurst, piers, clubs...
  # GTS marine stations via NDBC, live-confirmed 2026-07-14 (radial search):
  # 62103 Channel LV, 62305 Greenwich LV, 62030+62050 W Channel buoys,
  # 62304 Sandettie LV, 62170 F3. Re-audit: scripts/find_ndbc_stations.py
  ndbc_stations: ["62103", "62305", "62030", "62050", "62304", "62170"]
  openmeteo: false
  focus: {lat: 50.76, lon: -1.30}   # Cowes
  nmea:
    enabled: false
    transport: udp
    port: 10110

trust:
  yacht: 1.0
  metar: 0.85
  ndbc: 0.9
  windycator: 0.8
  openmeteo: 0.4

scoring:
  window_h: 48
  half_weight_nm: 30
  lead_half_h: 24
  recency_half_h: 12
  err_scale_ms: 2.5
  publish_window_h: 24
