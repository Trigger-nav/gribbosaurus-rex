# Solent + central UK south coast — inshore racing (Cowes Week, RORC
# starts, weekends). Tight box keeps verification focused on local effects.

name: solent
description: Solent, Isle of Wight, Poole Bay to Selsey Bill
enabled: true

bbox:
  lat_min: 50.35
  lat_max: 51.0
  lon_min: -2.1
  lon_max: -0.6

models:
  - ifs
  - aifs
  - gfs
  - icon_eu

max_lead_hours: 72
keep_runs: 8
data_dir: data          # shared fleet store (one DB, one GRIB cache)
poll_minutes: 10

observations:
  metar: true            # EGHI Southampton, EGHH Bournemouth, EGJB/EGJJ...
  windycator: true       # Bramble Post, Calshot, Hurst, Lymington, piers...
  ndbc_stations: []
  openmeteo: false
  focus: {lat: 50.76, lon: -1.30}   # Cowes
  nmea:
    enabled: false
    transport: udp
    port: 10110

trust:
  yacht: 1.0
  metar: 0.85
  ndbc: 0.9
  windycator: 0.8       # aggregated club/marina/VTS stations, quality varies
  openmeteo: 0.4

scoring:
  window_h: 48
  half_weight_nm: 20     # tighter than open water — Solent effects are local
  lead_half_h: 24
  recency_half_h: 12
  err_scale_ms: 2.5
  publish_window_h: 24
