# Gribbosaurus Rex — race configuration
# One file per race/venue. Pass to the fetcher/API with --config or GRIBBO_CONFIG.

name: balearics-summer
description: Palma Bay / Balearics training and racing area
enabled: true

# Bounding box (degrees). Longitudes in [-180, 180].
bbox:
  lat_min: 38.0
  lat_max: 40.5
  lon_min: 0.5
  lon_max: 3.5

# Which models to fetch. Keys must exist in fetch/registry.py
# ifs        ECMWF IFS 0.25° open data
# aifs       ECMWF AIFS (ML model) 0.25° open data
# gfs        NOAA GFS 0.25° via NOMADS (server-side bbox subset)
# icon_eu    DWD ICON-EU 0.0625° regular lat-lon (Europe only)
models:
  - ifs
  - aifs
  - gfs
  - icon_eu

# Forecast horizon to download (hours from cycle time).
max_lead_hours: 96

# Keep at most this many complete runs per model on disk (older ones pruned).
keep_runs: 8

# Where GRIBs + the run database live (relative to repo root or absolute).
data_dir: data

# Poller: how often to check for new cycles, in minutes.
poll_minutes: 10

# ---------------------------------------------------------------- Phase 2

observations:
  metar: true              # airport obs in the bbox (aviationweather.gov)
  ndbc_stations: []        # NDBC buoy ids, e.g. [61198] — mostly US/Atlantic
  openmeteo: false         # served "current" data — model-derived, low trust
  # Fallback anchor for distance weighting when no fresh yacht position:
  focus: {lat: 39.45, lon: 2.55}   # Palma Bay; omit to use bbox centroid
  nmea:
    enabled: false         # turn on when the boat feed is pointed at us
    transport: udp         # udp | tcp
    port: 10110            # Expedition/NMEA-over-network default

# How much to trust each source (relative, 0..1)
trust:
  yacht: 1.0
  metar: 0.85
  ndbc: 0.9
  openmeteo: 0.4

scoring:
  window_h: 48             # racing-profile rolling window (dashboard trend)
  half_weight_nm: 30       # obs at this distance from the yacht counts 50%
  lead_half_h: 24          # forecast lead at which weight halves
  recency_half_h: 12       # obs age at which weight halves
  err_scale_ms: 2.5        # SI. score = exp(-rmse_ms/scale); ≈ old 5kn
  publish_window_h: 24     # arbiter obs window, published as obs_window_h
